<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>社内イントラサイト | ダッシュボード</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- TOPBAR -->
<header class="topbar">

  <!-- SEARCH -->
  <div class="search-box">

    <i class="fa-solid fa-magnifying-glass"></i>

    <input
      type="text"
      placeholder="Search..."
    >

  </div>

  <!-- RIGHT -->
  <div class="topbar-right">

    <!-- PROFILE -->
    <div class="profile-menu" id="profileMenu">

  <button class="profile-btn" id="profileToggle">

  <div class="profile-info">

    <div class="profile-avatar">
      A
    </div>

    <span>管理者</span>

  </div>

  <i class="fa-solid fa-chevron-down"></i>

</button>

  <!-- DROPDOWN -->
  <div class="dropdown-menu" id="dropdownMenu">

    <a href="#">
      <i class="fa-regular fa-user"></i>
      マイプロフィール
    </a>

    <a href="#" id="logoutBtn">
      <i class="fa-solid fa-right-from-bracket"></i>
      ログアウト
    </a>

  </div>

</div>
    <!-- SETTINGS -->
    <button class="settings-btn">
      <i class="fa-solid fa-gear"></i>
    </button>

  </div>

</header>

<!-- MAIN -->
<main class="dashboard">

  <!-- DATE/TIME -->
  <section class="time-section">

    <p class="today-date" id="currentDate">
      2026年5月21日 木曜日
    </p>

    <h1 id="currentTime">
      00:00:00
    </h1>

  </section>

  <!-- ATTENDANCE -->
  <section class="attendance-buttons">

    <button class="clock-btn primary">
      <i class="fa-solid fa-building-user"></i>
      出勤
    </button>

    <button class="clock-btn break">
      <i class="fa-solid fa-mug-hot"></i>
      休憩中
    </button>

    <button class="clock-btn danger">
      <i class="fa-solid fa-door-open"></i>
      退勤
    </button>

  </section>

  <!-- MENU GRID -->
  <section class="menu-grid">

    <div class="menu-card">
      <i class="fa-solid fa-bullhorn"></i>
      <p>お知らせ</p>
    </div>

    <div class="menu-card">
      <i class="fa-solid fa-calendar"></i>
      <p>カレンダー</p>
    </div>

    <div class="menu-card">
      <i class="fa-solid fa-file-pen"></i>
      <p>業務日報</p>
    </div>

   

    <div class="menu-card">
      <i class="fa-solid fa-bus"></i>
      <p>通勤手当支給申請書</p>
    </div>

    <div class="menu-card">
      <i class="fa-solid fa-solid fa-person-walking-luggage"></i>
      <p>休暇・欠勤申請</p>
    </div>

  </section>
<!-- FLOATING CHAT -->
<button class="chat-btn">

  <i class="fa-solid fa-comment-dots"></i>

</button>

  <!-- FOOTER -->
<footer>
  <p>
    Copyright &#169; 2026
    株式会社グローバルイノベーション
    All Rights Reserved.
  </p>
</footer>

</main>

<!-- SCRIPT -->
<script>


/* =========================
   DATE / TIME (JST)
========================= */

function updateDateTime(){

  const now = new Date();

  const dateOptions = {
    timeZone: "Asia/Tokyo",
    year: "numeric",
    month: "long",
    day: "numeric",
    weekday: "long"
  };

  const timeOptions = {
    timeZone: "Asia/Tokyo",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  };

  const currentDate =
    now.toLocaleDateString("ja-JP", dateOptions);

  const currentTime =
    now.toLocaleTimeString("ja-JP", timeOptions);

  document.getElementById("currentDate").textContent =
    currentDate;

  document.getElementById("currentTime").textContent =
    currentTime;
}

// RUN IMMEDIATELY
updateDateTime();

// UPDATE EVERY SECOND
setInterval(updateDateTime, 1000);


/* =========================
   PROFILE DROPDOWN
========================= */

const profileToggle =
  document.getElementById("profileToggle");

const dropdownMenu =
  document.getElementById("dropdownMenu");

profileToggle.addEventListener("click", function(e){

  e.stopPropagation();

  dropdownMenu.classList.toggle("show");

});

/* CLOSE WHEN CLICK OUTSIDE */

document.addEventListener("click", function(){

  dropdownMenu.classList.remove("show");

});


/* =========================
   LOGOUT FUNCTION
========================= */

const logoutBtn =
  document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", function(e){

  e.preventDefault();

  const confirmLogout =
    confirm("ログアウトしますか？");

  if(confirmLogout){

    window.location.href = "index.html";

  }

});

</script>

</body>
</html>
